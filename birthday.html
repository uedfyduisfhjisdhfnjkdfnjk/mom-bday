<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mom ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd6e0);
    padding:20px;
    position:relative;
}

.container{
    width:100%;
    max-width:400px;
    text-align:center;
    color:white;
    z-index:2;
    animation:fadeIn 2s ease;
}

.photo{
    width:100%;
    border-radius:20px;
    border:4px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    margin-bottom:20px;
}

h1{
    font-size:2.3rem;
    margin-bottom:15px;
    animation:glow 2s infinite alternate;
}

.message{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:18px;
    border-radius:20px;
    font-size:1rem;
    line-height:1.7;
}

/* HEARTS */

.heart{
    position:absolute;
    bottom:-50px;
    color:#ff2d55;
    animation:floatUp linear forwards;
    opacity:0.8;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(0.5);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }

    to{
        text-shadow:0 0 25px #ff4d6d;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:480px){

    h1{
        font-size:1.8rem;
    }

    .message{
        font-size:0.95rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- CHANGE THIS NAME TO YOUR PHOTO NAME -->
    <img src="mom.jpg" class="photo">

    <h1>Happy Birthday Mom ❤️</h1>

    <div class="message">
        Thank you for always being there for me through everything.
        Your love, kindness, and strength mean the world to me.
        I hope your birthday is filled with happiness, laughter,
        and everything beautiful you deserve. 🎂✨
    </div>

</div>

<script>

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left = Math.random() * window.innerWidth + "px";

    heart.style.fontSize = (Math.random() * 20 + 15) + "px";

    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    },7000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
